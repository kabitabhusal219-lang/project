<!DOCTYPE html>
<html>
<head>
  <title>Advanced Demo</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(to right, #667eea, #764ba2);
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    button {
      padding: 10px 15px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #5a67d8;
    }
  </style>
</head>
<body>

<div class="card">
  <h2 id="text">Click the button</h2>
  <button onclick="changeText()">Click Me</button>
</div>

<script>
  function changeText() {
    document.getElementById("text").innerText = "You clicked!";
  }
</script>

</body>
</html>
